<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CloudAuth | Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<link rel="stylesheet" href="./css/style.css">

</head>

<body>

<div class="container">

<div class="left">

<div class="logo">
☁️
</div>

<h1>CloudAuth</h1>

<h3>3-Tier AWS Authentication System</h3>

<p>

Secure Login Platform built using Node.js,
Express, MongoDB Atlas,
AWS Elastic Beanstalk & S3.

</p>

<div class="tech">

<span>AWS</span>
<span>Node.js</span>
<span>MongoDB</span>
<span>JWT</span>

</div>

</div>

<div class="right">

<div class="card">

<h2>Welcome Back 👋</h2>

<p>

Login to continue your cloud journey.

</p>

<form id="loginForm">

<div class="input-group">

<i class="bi bi-envelope-fill"></i>

<input
type="email"
id="email"
placeholder="Email Address"
required>

</div>

<div class="input-group password-box">

<i class="bi bi-lock-fill"></i>

<input
type="password"
id="password"
placeholder="Password"
required>

<i
class="bi bi-eye-fill toggle-password"
id="togglePassword">
</i>

</div>

<button
class="btn-login"
type="submit">

Login →

</button>

</form>

<p class="bottom-text">

Don't have an account?

<a href="register.html">

Register

</a>

</p>

</div>

</div>

</div>

<script src="./js/login.js"></script>

</body>

</html>
